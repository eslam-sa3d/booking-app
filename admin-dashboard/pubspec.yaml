name: admin_dashboard
description: "Swim Academy staff admin dashboard — classes, calendar, banners, packages, payments, notifications."
publish_to: 'none'
version: 0.1.1+2

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: any

  # Data models shared with the mobile app
  shared:
    path: ../shared

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Backend
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  cloud_functions: ^5.1.6
  firebase_storage: ^12.3.6

  # Calendar UI
  table_calendar: ^3.1.3

  # Data tables / charts
  data_table_2: ^2.5.16
  fl_chart: ^0.69.2

  # Images
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # Persists the staff member's language choice locally
  shared_preferences: ^2.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true
