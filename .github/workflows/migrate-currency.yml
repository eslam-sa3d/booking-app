name: Migrate currency SAR to EGP

on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'Actually write changes (unchecked = dry run, reports counts only)'
        type: boolean
        required: false
        default: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/functions
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/functions/package-lock.json

      - run: npm ci

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_DEPLOY_SA_KEY }}'

      - name: Migrate
        env:
          FIREBASE_PROJECT_ID: booking-app-36b8e
        run: |
          if [ "${{ inputs.apply }}" = "true" ]; then
            node scripts/migrate-currency-to-egp.js --apply
          else
            node scripts/migrate-currency-to-egp.js
          fi
