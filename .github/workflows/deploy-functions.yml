name: Deploy Firebase Functions

on:
  workflow_dispatch:
    inputs:
      only:
        description: 'Functions to deploy (firebase deploy --only functions:X,Y). Leave blank to deploy all functions.'
        required: false
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/functions
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/functions/package-lock.json

      - run: npm ci

      - run: npm run build

      - run: npm run lint

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_DEPLOY_SA_KEY }}'

      - run: npm install -g firebase-tools

      - name: Deploy
        run: |
          if [ -n "${{ inputs.only }}" ]; then
            firebase deploy --only "functions:${{ inputs.only }}" --project booking-app-36b8e --non-interactive
          else
            firebase deploy --only functions --project booking-app-36b8e --non-interactive
          fi
