name: booking_app
description: "Swim Academy booking app — browse classes, book slots, manage family & packages."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: any

  # Data models shared with the admin dashboard
  shared:
    path: ../shared

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Booking calendar
  table_calendar: ^3.1.3

  # Local storage / caching
  shared_preferences: ^2.3.5

  # Images
  cached_network_image: ^3.4.1

  # Local notifications (booking reminders)
  flutter_local_notifications: ^18.0.1

  # Support links (WhatsApp, email, phone)
  url_launcher: ^6.3.1

  # Backend
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  firebase_messaging: ^15.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
